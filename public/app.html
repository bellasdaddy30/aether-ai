<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AETHER — Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

<!-- ── Auth Modal ── -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <div class="modal-title">AETHER</div>
    <div class="modal-subtitle">Enter the intelligence</div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="loginTab" onclick="switchAuthTab('login')">Login</button>
      <button class="modal-tab" id="registerTab" onclick="switchAuthTab('register')">Register</button>
    </div>
    <form class="modal-form" id="authForm" onsubmit="return false;">
      <div id="usernameField" style="display:none;">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="usernameInput" placeholder="Your name" minlength="2" maxlength="50" />
      </div>
      <div>
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="emailInput" placeholder="you@example.com" required />
      </div>
      <div>
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="passwordInput" placeholder="••••••••" minlength="8" required />
      </div>
      <div class="modal-error" id="authError"></div>
      <div class="modal-footer">
        <button type="submit" class="btn-primary" id="authSubmitBtn" onclick="handleAuth()">
          Enter
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ── App Shell ── -->
<div class="app-shell" id="appShell" style="display:none;">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">AETHER</span>
      <span class="sidebar-tier-badge" id="tierBadge">FREE</span>
    </div>

    <button class="new-chat-btn" onclick="newConversation()">
      <span>+</span> <span>New Conversation</span>
    </button>

    <div class="conversation-list" id="conversationList">
      <!-- Populated by JS -->
    </div>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-name" id="userName">Loading…</div>
      </div>
      <div class="sidebar-actions">
        <button class="sidebar-action-btn" onclick="openSettings()">Settings</button>
        <a class="sidebar-action-btn" href="/pricing">Upgrade</a>
        <button class="sidebar-action-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="chat-main">
    <div class="chat-toolbar">
      <div class="toolbar-tabs">
        <button class="tab-btn active" onclick="switchTab('chat')">Chat</button>
        <button class="tab-btn" onclick="switchTab('image')">Images</button>
        <button class="tab-btn" id="vrTabBtn" onclick="openVR()" style="display:none;">VR</button>
        <button class="tab-btn" onclick="switchTab('account')">Account</button>
        
      </div>
      <div class="toolbar-right">
        <span class="model-display" id="modelDisplay">—</span>
        <span class="usage-counter" id="usageCounter"></span>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="tab-panel active" id="chatPanel">
      <div class="messages-container" id="messagesContainer">
        <div class="messages-inner" id="messagesInner">
          <div class="empty-state" id="emptyState">
            <div class="empty-logo">A</div>
            <div class="empty-tagline">What shall we explore?</div>
            <div class="starter-chips">
              <button class="starter-chip" onclick="sendStarter(this)">Explain quantum entanglement intuitively</button>
              <button class="starter-chip" onclick="sendStarter(this)">Write a noir short story opening</button>
              <button class="starter-chip" onclick="sendStarter(this)">What makes great product design?</button>
              <button class="starter-chip" onclick="sendStarter(this)">Debate: free will vs determinism</button>
            </div>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-inner">
          <div class="input-toolbar">
            <button class="input-tool-btn" id="voiceBtn" title="Voice input" onclick="toggleVoice()">🎙</button>
            <button class="input-tool-btn" id="ttsBtn" title="Read response aloud" onclick="toggleTTS()">🔊</button>
          </div>
          <div class="chat-input-wrap">
            <textarea
              class="chat-input"
              id="chatInput"
              placeholder="Speak your mind…"
              rows="1"
              onkeydown="handleInputKeydown(event)"
              oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
          </div>
          <div class="input-footer">
            <span class="input-hint">Shift+Enter for new line</span>
            <span class="usage-counter" id="msgCounter"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Image Panel -->
    <div class="tab-panel" id="imagePanel">
      <div class="image-panel">
        <div class="image-form">
          <h3 style="font-family:var(--font-display);font-size:0.85rem;letter-spacing:0.2em;color:var(--gold-dim);margin-bottom:1.5rem;">IMAGE SYNTHESIS</h3>

          <div class="form-group">
            <label class="form-label">Prompt</label>
            <textarea class="form-textarea" id="imagePrompt" rows="3"
              placeholder="Describe what you want to see…"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Negative Prompt (optional)</label>
            <input class="form-input" id="imageNegative" type="text"
              placeholder="What to exclude…" />
          </div>

          <div id="imageGenStatus"></div>

          <button class="generate-btn" id="generateBtn" onclick="generateImage()">
            Generate
          </button>

          <div class="image-result-grid" id="imageGrid">
            <!-- Images populated here -->
          </div>
        </div>
      </div>
    </div>
  
    <div class="tab-panel" id="accountPanel">
      <div style="flex:1;overflow-y:auto;padding:2rem;max-width:700px;margin:0 auto;width:100%;">
        <h3 style="font-family:var(--font-display);font-size:0.85rem;letter-spacing:0.2em;color:var(--gold-dim);margin-bottom:2rem;">ACCOUNT</h3>

        <div style="border:1px solid var(--border);padding:2rem;margin-bottom:1.5rem;background:var(--surface);">
          <div style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.2em;color:var(--text-dim);margin-bottom:1rem;">MEMBERSHIP</div>
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
            <div>
              <div id="acct-tier" style="font-family:var(--font-display);font-size:1.4rem;color:var(--gold-dim);">Loading...</div>
              <div id="acct-status" style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dim);margin-top:0.3rem;"></div>
            </div>
            <a href="/pricing" style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.5rem 1.2rem;border:1px solid var(--border-focus);color:var(--gold-dim);text-decoration:none;">Upgrade</a>
          </div>
        </div>

        <div style="border:1px solid var(--border);padding:2rem;margin-bottom:1.5rem;background:var(--surface);">
          <div style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.2em;color:var(--text-dim);margin-bottom:1rem;">USAGE TODAY</div>
          <div style="display:flex;gap:2rem;flex-wrap:wrap;">
            <div>
              <div id="acct-msgs" style="font-family:var(--font-display);font-size:1.8rem;color:var(--text-primary);">0</div>
              <div style="font-family:var(--font-mono);font-size:0.55rem;color:var(--text-dim);">MESSAGES</div>
            </div>
            <div>
              <div id="acct-imgs" style="font-family:var(--font-display);font-size:1.8rem;color:var(--text-primary);">0</div>
              <div style="font-family:var(--font-mono);font-size:0.55rem;color:var(--text-dim);">IMAGES</div>
            </div>
          </div>
        </div>

        <div style="border:1px solid var(--border);padding:2rem;margin-bottom:1.5rem;background:var(--surface);">
          <div style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.2em;color:var(--text-dim);margin-bottom:1rem;">PROFILE</div>
          <div style="margin-bottom:1rem;">
            <label style="display:block;font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.5rem;">Username</label>
            <input class="form-input" id="acct-username" type="text" style="width:100%;" />
          </div>
          <div>
            <label style="display:block;font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.5rem;">Custom AI Persona</label>
            <textarea class="form-textarea" id="acct-persona" rows="4" style="width:100%;" placeholder="Give AETHER a role, expertise, or personality..."></textarea>
          </div>
          <button onclick="saveAccountSettings()" style="margin-top:1rem;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border:none;color:#0a0a0f;font-family:var(--font-display);font-size:0.75rem;font-weight:600;letter-spacing:0.15em;padding:0.75rem 1.8rem;cursor:pointer;">Save Changes</button>
        </div>

        <div style="border:1px solid var(--border);padding:2rem;background:var(--surface);">
          <div style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.2em;color:var(--text-dim);margin-bottom:1rem;">BILLING</div>
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
            <button onclick="openBillingPortal()" style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.5rem 1.2rem;border:1px solid var(--border-focus);color:var(--gold-dim);background:transparent;cursor:pointer;">Manage Subscription</button>
            <button onclick="logout()" style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.5rem 1.2rem;border:1px solid rgba(192,57,43,0.3);color:#c0392b;background:transparent;cursor:pointer;">Sign Out</button>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- ── Settings Modal ── -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal" style="max-width:520px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
      <div class="modal-title">Settings</div>
      <button onclick="closeSettings()" style="background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer;">×</button>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Identity</div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="settingsUsername" type="text" />
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">AETHER Persona</div>
      <div class="form-group">
        <label class="form-label">Custom System Prompt</label>
        <textarea class="form-textarea" id="settingsSystemPrompt" rows="4"
          placeholder="Give AETHER a specific role, expertise, or personality…"></textarea>
      </div>
    </div>

    <div class="settings-section" id="billingSection">
      <div class="settings-section-title">Billing</div>
      <button class="btn-ghost" onclick="openBillingPortal()">Manage Subscription</button>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
      <button class="btn-primary" onclick="saveSettings()">Save Changes</button>
      <button class="btn-ghost" onclick="closeSettings()">Cancel</button>
    </div>
  </div>
</div>

<!-- ── Toast Container ── -->
  <a href="/" style="position:fixed;top:1.2rem;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;border:1px solid var(--border);padding:0.3rem 0.8rem;z-index:200;transition:all 0.2s;" onmouseover="this.style.color='var(--gold-dim)'" onmouseout="this.style.color='var(--text-dim)'">← Home</a>
<div class="toast-container" id="toastContainer"></div>

<script src="/js/voice.js"></script>
<script src="/js/image.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
